apiVersion: v1
kind: Service
metadata:
  name: gate-module-service
spec:
  selector:
    app: gate-module
  type: LoadBalancer
  ports:
    - protocol: TCP
      name: main-port
      port: 8080
      targetPort: 8080
    - protocol: TCP
      name: debug-port
      port: 5005
      targetPort: 5005