apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-module-deployment
  labels:
    app: stock-module
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stock-module
  template:
    metadata:
      labels:
        app: stock-module
    spec:
      containers:
        - name: stock-module
          image: stock:1.1.6
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9084
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 9084
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 9084
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          envFrom:
            - configMapRef:
                name: common-config
            - secretRef:
                name: common-secret
          env:
            - name: MODULE_GROUP_ID
              value: STOCK_GROUP_ID
            - name: SERVICE_PORT
              value: '9084'