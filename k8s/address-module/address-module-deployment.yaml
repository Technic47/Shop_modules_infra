apiVersion: apps/v1
kind: Deployment
metadata:
  name: address-module-deployment
  labels:
    app: address-module
spec:
  replicas: 1
  selector:
    matchLabels:
      app: address-module
  template:
    metadata:
      labels:
        app: address-module
    spec:
      containers:
        - name: address-module
          image: address:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9080
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 9080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 9080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          envFrom:
            - configMapRef:
                name: common-config
            - secretRef:
                name: common-secret
          env:
            - name: MODULE_GROUP_ID
              value: ADDRESS_GROUP_ID
            - name: SERVICE_PORT
              value: '9080'